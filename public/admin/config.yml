backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: git-gateway
  config:
    multiple: true

collections:
  - name: "portfolio"
    label: "Portfolio Works"
    folder: "content/portfolio"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Gallery", name: "gallery", widget: "list", field: { label: "Image", name: "image", widget: "image" } }

  - name: "about"
    label: "About Page"
    files:
      - file: "content/pages/about.md"
        label: "About Me"
        name: "about"
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Profile Image", name: "image", widget: "image" }
          # These match your 8+ Years, 100+ Projects, etc.
          - { label: "Stats", name: "stats", widget: "list", fields: [
              { label: "Label", name: "label", widget: "string" },
              { label: "Value", name: "value", widget: "string" }
            ]}
          # This matches your Technical Arsenal bars
          - { label: "Technical Arsenal", name: "arsenal", widget: "list", fields: [
              { label: "Skill Name", name: "name", widget: "string" },
              { label: "Percentage", name: "level", widget: "number" }
            ]}
          # This matches your Career Log timeline
          - { label: "Career Log", name: "log", widget: "list", fields: [
              { label: "Year", name: "year", widget: "string" },
              { label: "Role", name: "role", widget: "string" },
              { label: "Company", name: "company", widget: "string" },
              { label: "Description", name: "desc", widget: "text" }
            ]}

  - name: "contact"
    label: "Contact Page"
    files:
      - file: "content/pages/contact.md"
        label: "Contact"
        name: "contact"
        fields:
          - { label: "Email", name: "email", widget: "string" }
